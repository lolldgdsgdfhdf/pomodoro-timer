<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Stats Dashboard</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --accent: #e94560;
    --text: #eee;
    --text-muted: #8892b0;
    --bar: #0f3460;
    --success: #4ade80;
    --warning: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px;
    max-width: 800px;
    margin: 0 auto;
  }
  h1 { font-size: 22px; margin-bottom: 24px; color: var(--accent); }

  /* Stat tiles */
  .tiles {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  .tile {
    background: var(--surface);
    border-radius: 10px;
    padding: 18px;
    text-align: center;
  }
  .tile .value {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }
  .tile .label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Chart area */
  .chart {
    background: var(--surface);
    border-radius: 10px;
    padding: 24px;
  }
  .chart h2 {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 20px;
    font-weight: 500;
  }
  .bars { display: flex; align-items: flex-end; gap: 10px; height: 180px; }
  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
  }
  .bar-col .count {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--text);
  }
  .bar-col .bar {
    width: 100%;
    max-width: 60px;
    background: var(--accent);
    border-radius: 4px 4px 0 0;
    min-height: 4px;
    transition: height 0.4s ease;
  }
  .bar-col .bar:hover { filter: brightness(1.3); }
  .bar-col .date {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
  }
  .bar-col .mins {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  @media (max-width: 600px) {
    .tiles { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<h1>Pomodoro Stats Dashboard</h1>

<div class="tiles">
  <div class="tile">
    <div class="value" id="total">--</div>
    <div class="label">Total Pomodoros</div>
  </div>
  <div class="tile">
    <div class="value" id="hours">--</div>
    <div class="label">Total Hours</div>
  </div>
  <div class="tile">
    <div class="value" id="today">--</div>
    <div class="label">Today</div>
  </div>
  <div class="tile">
    <div class="value" id="streak">--</div>
    <div class="label">Day Streak</div>
  </div>
</div>

<div class="chart">
  <h2>Last 7 Days — Pomodoro Count</h2>
  <div class="bars" id="bars"></div>
</div>

<script>
// Embedded data from pomodoro_stats snapshot
const DATA = {
  "total":32, "hours":15.3, "today":3, "today_mins":95,
  "week":32, "week_mins":920, "streak":7,
  "daily":{
    "2026-06-29":{"count":1,"minutes":30},
    "2026-06-30":{"count":8,"minutes":195},
    "2026-07-01":{"count":6,"minutes":190},
    "2026-07-02":{"count":4,"minutes":120},
    "2026-07-03":{"count":4,"minutes":130},
    "2026-07-04":{"count":6,"minutes":160},
    "2026-07-05":{"count":3,"minutes":95}
  }
};

// Populate tiles
document.getElementById('total').textContent = DATA.total;
document.getElementById('hours').textContent = DATA.hours + 'h';
document.getElementById('today').textContent = DATA.today;
document.getElementById('streak').textContent = DATA.streak + 'd';

// Build bars
const maxCount = Math.max(...Object.values(DATA.daily).map(d => d.count));
const bars = document.getElementById('bars');

for (const [date, d] of Object.entries(DATA.daily)) {
  const height = (d.count / maxCount) * 150;
  const label = date.slice(5); // MM-DD
  const col = document.createElement('div');
  col.className = 'bar-col';
  col.innerHTML =
    '<div class="count">' + d.count + '</div>' +
    '<div class="bar" style="height:' + height + 'px"></div>' +
    '<div class="date">' + label + '</div>' +
    '<div class="mins">' + d.minutes + 'm</div>';
  bars.appendChild(col);
}
</script>

</body>
</html>
